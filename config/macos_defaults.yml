# macOS defaults to apply via `defaults write`
# Each entry: domain, key, type (string/bool/int/float), value,
#             [sudo], [current_host]
# Set `sudo: true` for system-level domains under /Library/Preferences/.
# Set `current_host: true` for per-host preferences (Control Center
#   module visibility, battery percentage, etc. — anything macOS writes
#   into ~/Library/Preferences/ByHost/).
# User-level domains (NSGlobalDomain, com.apple.*) in the main plist
# don't need either flag.

# Appearance
- domain: NSGlobalDomain
  key: AppleInterfaceStyle
  type: string
  value: Dark

- domain: NSGlobalDomain
  key: NSGlassDiffusionSetting
  type: bool
  value: true

- domain: NSGlobalDomain
  key: AppleIconAppearanceTheme
  type: string
  value: RegularDark

- domain: NSGlobalDomain
  key: NSTableViewDefaultSizeMode
  type: int
  value: 2

- domain: NSGlobalDomain
  key: AppleReduceDesktopTinting
  type: bool
  value: true

# Dock
- domain: com.apple.dock
  key: tilesize
  type: int
  value: 24

- domain: com.apple.dock
  key: magnification
  type: bool
  value: true

- domain: com.apple.dock
  key: largesize
  type: int
  value: 56

- domain: com.apple.dock
  key: orientation
  type: string
  value: right

- domain: com.apple.dock
  key: mineffect
