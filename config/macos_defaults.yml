- domain: NSGlobalDomain
  key: AppleActionOnDoubleClick
  type: string
  value: Maximize

- domain: com.apple.dock
  key: autohide
  type: bool
  value: true

- domain: com.apple.dock
  key: launchanim
  type: bool
  value: true

- domain: com.apple.dock
  key: show-process-indicators
  type: bool
  value: true

- domain: com.apple.dock
  key: show-recents
  type: bool
  value: true

- domain: com.apple.WindowManager
  key: GloballyEnabled
