  value: false

# Tiling & Mission Control
- domain: com.apple.WindowManager
  key: EnableTiledWindowMargins
  type: bool
  value: false

- domain: com.apple.dock
  key: mru-spaces
  type: bool
  value: false

- domain: com.apple.dock
  key: expose-group-apps
  type: bool
  value: false

# Menu Bar
- domain: com.apple.menuextra.clock
  key: IsAnalog
  type: bool
  value: false

- domain: com.apple.menuextra.clock
  key: ShowDate
  type: int
  value: 1

- domain: com.apple.menuextra.clock
  key: ShowDayOfWeek
  type: bool
  value: true

- domain: com.apple.menuextra.clock
  key: Show24Hour
  type: bool
  value: true

- domain: NSGlobalDomain
  key: AppleMenuBarVisualEffect
  type: string
  value: None

# Menu Bar — Control Center module visibility.
# Per-host integer schema: 8 = "Show in Control Center only",
#                          18 = "Always Show in Menu Bar".
# The host-independent `NSStatusItem VisibleCC <Module>` bool is *not*
# sufficient on its own — ControlCenter reads visibility from the
# per-host integer. Tested live on Apple Silicon / macOS Tahoe.
- domain: com.apple.controlcenter
  key: Sound
  type: int
  value: 18
  current_host: true

- domain: com.apple.controlcenter
  key: Bluetooth
  type: int
  value: 18
  current_host: true

- domain: com.apple.controlcenter
  key: Battery
  type: int
  value: 18
  current_host: true

- domain: com.apple.controlcenter
  key: BatteryShowPercentage
  type: bool
  value: true
  current_host: true

# Hide FocusModes from menu bar (8 = Control Center only).
- domain: com.apple.controlcenter
  key: FocusModes
  type: int
  value: 8
  current_host: true

# Widgets
- domain: com.apple.widgets
  key: WidgetsEnabled
  type: bool
  value: false

# Spotlight
- domain: com.apple.assistant.support
  key: "Search Queries Data Sharing Status"
  type: int
  value: 2

# Accessibility — disable all shortcuts
- domain: com.apple.universalaccess
  key: closeViewScrollWheelToggle
  type: bool
  value: false

- domain: com.apple.universalaccess
  key: closeViewHotkeysEnabled
  type: bool
  value: false

# Siri & Apple Intelligence
- domain: com.apple.assistant.support
  key: "Assistant Enabled"
  type: bool
  value: false

- domain: com.apple.Siri
  key: StatusMenuVisible
  type: bool
  value: false

- domain: com.apple.Siri
  key: VoiceTriggerEnabled
  type: bool
  value: false

# Universal Control / Sidecar — disable linking to other Macs/iPads
- domain: com.apple.universalcontrol
  key: Disable
  type: bool
  value: true

# AirDrop & Continuity
- domain: com.apple.AirDrop
  key: DiscoverableMode
  type: string
  value: "Off"

- domain: NSGlobalDomain
  key: AirPlayEnabled
  type: bool
  value: false

- domain: NSGlobalDomain
  key: NSEnableHandoff
  type: bool
  value: false

- domain: com.apple.coreservices.useractivityd
  key: ActivityAdvertisingAllowed
  type: bool
  value: false

- domain: com.apple.coreservices.useractivityd
  key: ActivityReceivingAllowed
  type: bool
  value: false

# Trash
- domain: com.apple.finder
  key: FXRemoveOldTrashItems
  type: bool
  value: true

# Finder
- domain: com.apple.finder
  key: AppleShowAllFiles
  type: bool
  value: true

- domain: com.apple.finder
  key: ShowPathbar
  type: bool
  value: true

# Software Updates — don't let Apple auto-install and reboot this server.
# "Background security improvements" in System Settings → General →
# Software Update → Automatic Updates maps to these two keys.
- domain: /Library/Preferences/com.apple.SoftwareUpdate
  key: CriticalUpdateInstall
  type: bool
  value: false
  sudo: true

- domain: /Library/Preferences/com.apple.SoftwareUpdate
  key: ConfigDataInstall
  type: bool
  value: false
  sudo: true

# Keyboard / Dictation — turn off the dictation feature entirely.
- domain: com.apple.HIToolbox
  key: AppleDictationAutoEnable
  type: int
  value: 0

# Trackpad — fast tracking, tap-to-click on.
# The two Clicking entries cover built-in and Bluetooth trackpads respectively;
# the global tapBehavior flag is what turns tap-to-click on system-wide.
- domain: NSGlobalDomain
  key: com.apple.trackpad.scaling
  type: float
  value: 2.5

- domain: com.apple.AppleMultitouchTrackpad
  key: Clicking
  type: bool
  value: true

- domain: com.apple.driver.AppleBluetoothMultitouch.trackpad
  key: Clicking
  type: bool
  value: true

- domain: NSGlobalDomain
  key: com.apple.mouse.tapBehavior
  type: int
  value: 1

# Terminal — enable the long-press accent palette (ç ć č ...) which Terminal's
# text view opts out of by default. Requires restarting Terminal to take effect.
- domain: com.apple.Terminal
  key: ApplePressAndHoldEnabled
  type: bool
  value: true
