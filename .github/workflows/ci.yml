name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ruby version
        run: ruby --version

      - name: Syntax check
        run: find lib test -name '*.rb' -exec ruby -c {} +

      - name: Run unit tests
        run: rake test:unit
